<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Open-FDD Testing Progress Dashboard</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --muted: #9db0d1;
      --text: #e8eefc;
      --accent: #6aa9ff;
      --accent2: #7ef0c1;
      --warn: #ffd166;
      --border: #233055;
    }
    body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    h1,h2,h3 { margin: 0 0 10px; }
    p { color: var(--muted); }
    .grid { display: grid; gap: 16px; }
    .top { grid-template-columns: 1.2fr .8fr; }
    .two { grid-template-columns: 1fr 1fr; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.22);
    }
    .badge { display:inline-block; padding:6px 10px; border-radius:999px; background:#13264f; color:var(--accent2); font-size:12px; margin-right:8px; }
    .small { font-size: 13px; color: var(--muted); }
    ul { margin: 10px 0 0 20px; }
    li { margin: 8px 0; }
    .timeline-item { border-left: 3px solid var(--accent); padding-left: 12px; margin: 14px 0; }
    .timeline-time { color: var(--warn); font-size: 12px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .commit { font-family: Consolas, monospace; font-size: 13px; }
    .footer { margin-top: 18px; font-size: 12px; color: var(--muted); }
    @media (max-width: 900px) { .top, .two { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid top">
      <section class="card">
        <span class="badge">last 24 hours</span>
        <span class="badge">local + GitHub</span>
        <h1>Open-FDD Testing Progress Dashboard</h1>
        <p id="summary">Loading progress…</p>
      </section>
      <section class="card">
        <h2>Tracked GitHub work</h2>
        <div id="github"></div>
      </section>
    </div>

    <div class="grid two" style="margin-top:16px;">
      <section class="card">
        <h2>Progress timeline</h2>
        <div id="timeline"></div>
      </section>
      <section class="card">
        <h2>Recent pushed commits</h2>
        <div id="commits"></div>
      </section>
    </div>

    <div class="grid two" style="margin-top:16px;">
      <section class="card">
        <h2>Key findings</h2>
        <ul id="findings"></ul>
      </section>
      <section class="card">
        <h2>Next steps</h2>
        <ul id="next"></ul>
      </section>
    </div>

    <div class="footer">Served locally from the automated testing repo. Refresh to reload current JSON snapshot.</div>
  </div>

  <script>
    async function load() {
      const res = await fetch('./progress.json?_=' + Date.now());
      const data = await res.json();
      document.getElementById('summary').textContent =
        `Status: ${data.summary.status}. Focus: ${data.summary.focus.join(' • ')}. Generated: ${data.generated_at}.`;

      document.getElementById('github').innerHTML = `
        <p><strong>Issue #${data.github.issue.number}</strong>: <a href="${data.github.issue.url}" target="_blank">${data.github.issue.title}</a></p>
        <p><strong>PR #${data.github.pr_watch.number}</strong>: <a href="${data.github.pr_watch.url}" target="_blank">${data.github.pr_watch.title}</a></p>
        <p class="small">Branch: ${data.github.pr_watch.branch}</p>
      `;

      document.getElementById('timeline').innerHTML = data.timeline.map(item => `
        <div class="timeline-item">
          <div class="timeline-time">${item.time}</div>
          <h3>${item.title}</h3>
          <p>${item.details}</p>
        </div>
      `).join('');

      document.getElementById('commits').innerHTML = data.recent_commits.map(c => `
        <p><span class="commit">${c.sha}</span> — ${c.message}<br><span class="small">${c.time}</span></p>
      `).join('');

      document.getElementById('findings').innerHTML = data.key_findings.map(x => `<li>${x}</li>`).join('');
      document.getElementById('next').innerHTML = data.next_steps.map(x => `<li>${x}</li>`).join('');
    }
    load();
  </script>
</body>
</html>
